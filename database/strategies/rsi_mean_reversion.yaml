name: "RSI Mean Reversion"
description: "Buy when RSI < 30, Sell when RSI > 70 (Mean reversion strategy)"

instruments:
  - symbol: "TCS"
    quantity: 1
    market: "NSE"
  - symbol: "WIPRO"
    quantity: 1
    market: "NSE"

entry_logic:
  condition: "rsi < 30"
  price_type: "limit"
  limit_offset_percent: 0.5

exit_logic:
  stop_loss_percent: 3.0
  profit_target_percent: 4.0
  time_based_exit: "15:30"

risk_params:
  max_positions: 3
  position_size_percent: 8.0
  max_loss_per_day: 10000
  max_daily_trades: 5
